<div class="view-container">
  <h2>Products</h2>

  <p *ngIf="isLoading">Loading products...</p>
  <p *ngIf="!isLoading && pageMsg">{{ pageMsg }}</p>

  <table *ngIf="!isLoading && allProducts.length">
    <tr>
      <th>Image</th>
      <th>Product Name</th>
      <th>Price</th>
      <th>Color</th>
      <th>Category</th>
      <th>Size</th>
      <th>Description</th>
    </tr>
    <tr *ngFor="let item of allProducts">
      <td><img [src]="item.image" [alt]="item.title"></td>
      <td>{{ item.title }}</td>
      <td>Rs {{ item.price }}</td>
      <td>{{ item.color }}</td>
      <td>{{ item.categories }}</td>
      <td>{{ item.size }}</td>
      <td>{{ item.desc }}</td>
    </tr>
  </table>
</div>
